<template name="diagT">
    <div>{{usedHelper}}</div>
    <div>{{badHelper someArg}}</div>
    {{> missingTemplate}}
    {{#unless or argOnlyHelper anotherArgHelper}}
        <span>hidden</span>
    {{/unless}}
    <div>{{usedHelper (or subExprHelper argOnlyHelper)}}</div>
    <div>{{usedHelper limit=hashArgHelper}}</div>
</template>

<template name="dup">
    <span>ok</span>
</template>

<template name="dup">
    <span>duplicated</span>
</template>

<template name="topTitleBar">
    {{#if extrasTemplate}}
        {{> extrasTemplate}}
    {{/if}}
</template>

<template name="titleBarHost">
    {{> topTitleBar extrasTemplate=(getTemplate "dup")}}
</template>
